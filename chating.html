<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat App</title>
    <script src="https://meet.jit.si/external_api.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Grand+Hotel&family=Inter:wght@400;500;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; overflow: hidden; background-color: #FAFAFA; font-family: 'Inter', sans-serif; }

        .app-container { display: flex; flex-direction: column; height: 100dvh; max-width: 500px; margin: 0 auto; background: #ffffff; position: relative; box-shadow: 0 0 15px rgba(0,0,0,0.05); }

        /* --- 🔐 AUTH SCREEN --- */
        .auth-screen { position: absolute; inset: 0; background: #FAFAFA; display: flex; flex-direction: column; z-index: 200; overflow-y: auto; }
        .auth-main-content { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; width: 100%; }
        .auth-box { background: #FFFFFF; border: 1px solid #DBDBDB; padding: 40px; width: 100%; max-width: 350px; display: flex; flex-direction: column; align-items: center; border-radius: 4px; }
        .auth-logo { font-family: 'Grand Hotel', cursive; font-size: 50px; margin-bottom: 35px; color: #000; letter-spacing: 1px; line-height: 1; }
        .input-group { width: 100%; margin-bottom: 10px; }
        .auth-input { width: 100%; padding: 12px 15px; border: 1px solid #DBDBDB; border-radius: 5px; background: #FAFAFA; font-size: 14px; outline: none; transition: 0.2s; }
        .auth-input:focus { border-color: #A8A8A8; background: #FFFFFF; }
        .auth-btn { width: 100%; background: #4CB5F9; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .auth-btn.active-btn { background: #0095F6; }
        .auth-error { color: #ED4956; font-size: 13px; margin-top: 15px; text-align: center; display: none; line-height: 1.4; }
        .switch-box { background: #FFFFFF; border: 1px solid #DBDBDB; padding: 20px; width: 100%; max-width: 350px; text-align: center; font-size: 14px; margin: 0 auto 20px auto; border-radius: 4px; }
        .switch-link { color: #0095F6; font-weight: 600; cursor: pointer; margin-left: 5px; }

        @media (max-width: 450px) {
            .auth-screen { background: #FFFFFF; }
            .auth-main-content { justify-content: flex-start; margin-top: 50px; }
            .auth-box { border: none; padding: 20px; max-width: 100%; }
            .switch-box { border: none; border-top: 1px solid #DBDBDB; margin: auto 0 0 0; border-radius: 0; }
        }

        /* --- 💬 MAIN CHAT APP UI --- */
        .chat-app-ui { display: none; flex-direction: column; height: 100%; }

        /* Header */
        .header { background: #ffffff; border-bottom: 1px solid #DBDBDB; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; z-index: 20; }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header-avatar { width: 38px; height: 38px; background: #E0F2FE; color: #0284C7; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; text-transform: uppercase; font-size: 16px; }
        .header-info h2 { font-size: 16px; font-weight: 600; color: #262626; text-transform: capitalize; }
        .header-info p { font-size: 12px; color: #10B981; font-weight: 500; }
        .header-icons { display: flex; gap: 18px; align-items: center; }
        .icon-btn { background: none; border: none; color: #262626; cursor: pointer; display: flex; padding: 4px; transition: 0.2s; }

        /* Online Tray (Adjusted for Date & Time Space) */
        .online-tray { background: #FAFAFA; padding: 12px 15px; display: flex; gap: 16px; overflow-x: auto; border-bottom: 1px solid #DBDBDB; align-items: flex-start; }
        .online-tray::-webkit-scrollbar { display: none; }
        .online-user { display: flex; flex-direction: column; align-items: center; gap: 5px; min-width: 75px; text-align: center; }
        
        .avatar-circle { width: 50px; height: 50px; border-radius: 50%; background: #E0F2FE; color: #0284C7; display: flex; justify-content: center; align-items: center; font-weight: bold; text-transform: uppercase; font-size: 20px; position: relative; transition: 0.3s; }
        .avatar-circle.online { border: 2.5px solid #10B981; }
        .avatar-circle.offline { border: 2px solid #D1D5DB; background: #F3F4F6; color: #9CA3AF; }
        
        .user-name-small { font-size: 12px; color: #262626; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 70px; text-transform: capitalize; font-weight: 600; }
        .user-status-small { font-size: 10px; font-weight: 500; line-height: 1.2; }
        .user-status-small.online { color: #10B981; font-weight: 600; }
        .user-status-small.offline { color: #6B7280; }

        /* Chat Body */
        .chat-body { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background-color: #FFFFFF; }
        .msg { max-width: 78%; padding: 10px 14px; border-radius: 18px; font-size: 14px; position: relative; line-height: 1.4; word-wrap: break-word; display: flex; flex-direction: column; }
        .msg.sent { background: #EFEFEF; align-self: flex-end; color: #262626; border-bottom-right-radius: 4px; } 
        .msg.received { background: #FFFFFF; align-self: flex-start; border: 1px solid #DBDBDB; color: #262626; border-bottom-left-radius: 4px; } 
        .sender { font-size: 11px; font-weight: 600; color: #8E8E8E; margin-bottom: 4px; display: block; text-transform: capitalize; }
        
        .msg img, .msg video { max-width: 100%; border-radius: 8px; margin-top: 5px; display: block; object-fit: cover; max-height: 250px; background: #ddd; }
        .msg .file-link { color: #0095F6; text-decoration: none; font-weight: 500; font-size: 13px; display: inline-flex; align-items: center; gap: 5px; margin-top: 5px; }
        .msg-footer { display: flex; justify-content: flex-end; align-items: center; gap: 8px; margin-top: 4px; width: 100%; }
        .time { font-size: 10px; color: #8E8E8E; }
        .delete-btn { background: none; border: none; cursor: pointer; color: #ED4956; padding: 2px; opacity: 0.7; display: flex; align-items: center; }

        .uploading { text-align: center; font-size: 12px; color: #0095F6; font-weight: bold; display: none; padding: 8px; background: #F0F9FF; border-bottom: 1px solid #DBDBDB; }
        .typing-indicator { font-size: 12px; color: #0095F6; padding: 8px 15px; display: none; font-style: italic; background: #FAFAFA; border-top: 1px solid #DBDBDB; }

        /* Footer */
        .footer { background: #FFFFFF; border-top: 1px solid #DBDBDB; padding: 10px 15px; display: flex; gap: 12px; align-items: center; padding-bottom: calc(10px + env(safe-area-inset-bottom)); position: relative; }
        .icon-btn-footer { background: none; border: none; font-size: 22px; cursor: pointer; padding: 5px; display: flex; align-items: center; justify-content: center; color: #262626; }
        .input-box { flex: 1; background: #EFEFEF; border: 1px solid transparent; border-radius: 20px; padding: 10px 15px; outline: none; font-size: 14px; }
        .input-box:focus { border-color: #DBDBDB; background: #FFFFFF; }
        .send-btn { background: transparent; color: #0095F6; border: none; font-weight: 600; font-size: 15px; cursor: pointer; opacity: 0.5; transition: 0.2s; }
        .send-btn.active { opacity: 1; }

        /* Call Overlay */
        .call-overlay { position: absolute; inset: 0; background: #111111; z-index: 250; display: none; flex-direction: column; }
        .call-container { flex: 1; width: 100%; height: 100%; background: #000; }
        .call-footer { background: #1A1111; padding: 15px; display: flex; justify-content: center; border-top: 1px solid #222; }
        .end-call-btn { background: #dc2626; color: white; border: none; padding: 12px 30px; border-radius: 25px; font-weight: 600; cursor: pointer; font-size: 14px; }

        /* Modals */
        .modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(2px); display: none; justify-content: center; align-items: center; z-index: 300; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 80%; max-width: 300px; text-align: center; }
        .modal-actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn-cancel { flex: 1; padding: 10px; border: none; border-radius: 8px; background: #F3F4F6; font-weight: 600; cursor: pointer; color: #4B5563; }
        .btn-danger { flex: 1; padding: 10px; border: none; border-radius: 8px; background: #ED4956; color: white; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div id="authScreen" class="auth-screen">
            <div class="auth-main-content">
                <div class="auth-box">
                    <div class="auth-logo">Chat App</div>
                    <div class="input-group"><input type="text" id="usernameInput" class="auth-input" placeholder="Username" autocomplete="off"></div>
                    <div class="input-group"><input type="password" id="passwordInput" class="auth-input" placeholder="Password"></div>
                    <button id="mainAuthBtn" class="auth-btn">Log In</button>
                    <div id="authError" class="auth-error">Error message</div>
                </div>
            </div>
            <div class="switch-box">
                <span id="switchText">Don't have an account?</span> 
                <span id="switchBtn" class="switch-link">Sign up</span>
            </div>
        </div>

        <div id="callOverlay" class="call-overlay">
            <div id="meetContainer" class="call-container"></div>
            <div class="call-footer">
                <button id="endCallBtn" class="end-call-btn">❌ End Call</button>
            </div>
        </div>

        <div id="chatAppUI" class="chat-app-ui">
            <div class="header">
                <div class="header-left">
                    <div class="header-avatar" id="headerAvatar">U</div>
                    <div class="header-info">
                        <h2 id="myProfileText">Username</h2>
                        <p>🟢 Active now</p>
                    </div>
                </div>
                <div class="header-icons">
                    <button class="icon-btn" id="videoCallBtn" title="Video Call">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
                    </button>
                    <button class="icon-btn" id="voiceCallBtn" title="Voice Call">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                    </button>
                    <button id="logoutBtn" class="icon-btn" style="color: #ED4956;" title="Log Out">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    </button>
                </div>
            </div>

            <div class="online-tray" id="onlineUsersList"></div>
            
            <div id="uploadStatus" class="uploading">Uploading media... Please wait.</div>
            <div class="chat-body" id="chatBody"></div>
            <div id="typingIndicator" class="typing-indicator">Someone typing...</div>

            <input type="file" id="fileInput" style="display: none;" accept="image/*,video/*,.pdf,.doc,.docx">

            <div class="footer">
                <button class="icon-btn-footer" id="attachBtn">📎</button>
                <input type="text" id="messageInput" class="input-box" placeholder="Message..." autocomplete="off">
                <button id="sendBtn" class="send-btn">Send</button>
            </div>
        </div>

        <div id="deleteModal" class="modal-overlay">
            <div class="modal-content">
                <h3 style="font-size: 16px; margin-bottom: 5px; color: #111827;">Delete Message?</h3>
                <p style="font-size: 13px; color: #6B7280;">This will delete it permanently for everyone.</p>
                <div class="modal-actions">
                    <button id="cancelDeleteBtn" class="btn-cancel">Cancel</button>
                    <button id="confirmDeleteBtn" class="btn-danger">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // 🔥 FIREBASE API KEYS
        const firebaseConfig = {
            apiKey: "AIzaSyB6OBfN-UovERSSQUuVKLQaEvDeko96CpA",
            authDomain: "chating-576a3.firebaseapp.com",
            projectId: "chating-576a3",
            storageBucket: "chating-576a3.firebasestorage.app",
            messagingSenderId: "419008189208",
            appId: "1:419008189208:web:f340c72c97c7978c3e846d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app); 

        let currentUser = null; 
        let isLoginMode = true; 
        let typingTimeout = null;
        let jitsiAPI = null;

        const authScreen = document.getElementById('authScreen');
        const chatAppUI = document.getElementById('chatAppUI');
        const usernameInput = document.getElementById('usernameInput');
        const passwordInput = document.getElementById('passwordInput');
        const mainAuthBtn = document.getElementById('mainAuthBtn');
        const authError = document.getElementById('authError');
        const chatBody = document.getElementById('chatBody');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const fileInput = document.getElementById('fileInput');
        const typingIndicator = document.getElementById('typingIndicator');
        const onlineUsersList = document.getElementById('onlineUsersList');
        const deleteModal = document.getElementById('deleteModal');
        const callOverlay = document.getElementById('callOverlay');

        document.getElementById('switchBtn').addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            authError.style.display = 'none';
            mainAuthBtn.innerText = isLoginMode ? "Log In" : "Sign Up";
            document.getElementById('switchText').innerText = isLoginMode ? "Don't have an account?" : "Have an account?";
            document.getElementById('switchBtn').innerText = isLoginMode ? "Sign up" : "Log in";
            checkInputs();
        });

        function checkInputs() {
            if(usernameInput.value.trim().length > 0 && passwordInput.value.trim().length > 5) mainAuthBtn.classList.add('active-btn');
            else mainAuthBtn.classList.remove('active-btn');
        }
        usernameInput.addEventListener('input', checkInputs);
        passwordInput.addEventListener('input', checkInputs);

        messageInput.addEventListener('input', () => {
            sendBtn.classList.toggle('active', messageInput.value.trim().length > 0);
            if (currentUser) {
                setDoc(doc(db, "typing_status", currentUser), { isTyping: true }).catch(console.error);
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => {
                    setDoc(doc(db, "typing_status", currentUser), { isTyping: false }).catch(console.error);
                }, 1500);
            }
        });

        function showError(msg) { authError.innerText = msg; authError.style.display = 'block'; }

        mainAuthBtn.addEventListener('click', async () => {
            const rawUsername = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            if (!rawUsername || !password) return showError("Please fill all fields.");
            if (rawUsername.length < 3) return showError("Username must be at least 3 characters.");
            
            mainAuthBtn.innerText = "Please wait...";
            const dummyEmail = rawUsername.toLowerCase().replace(/\s+/g, '') + "@chat.com";

            try {
                if(isLoginMode) await signInWithEmailAndPassword(auth, dummyEmail, password);
                else await createUserWithEmailAndPassword(auth, dummyEmail, password);
            } catch (error) {
                mainAuthBtn.innerText = isLoginMode ? "Log In" : "Sign Up";
                let errorMsg = error.message.replace("Firebase: ", "");
                if (error.code === "auth/invalid-credential") errorMsg = "Incorrect username or password.";
                if (error.code === "auth/email-already-in-use") errorMsg = "Username already taken.";
                showError(errorMsg);
            }
        });

        // --- PRESENCE ENGINE (Fixed for Exact Timestamp Update) ---
        function updatePresence(isOnline) {
            if(currentUser) {
                const presenceData = { name: currentUser, isOnline: isOnline };
                // Jab user offline ho tabhi lastSeen time database me update karna hai
                if(!isOnline) {
                    presenceData.lastSeen = new Date().getTime(); 
                }
                setDoc(doc(db, "active_users", currentUser), presenceData, { merge: true }).catch(console.error);
            }
        }

        // Multiple event listeners ensure that offline status triggers accurately
        window.addEventListener("beforeunload", () => updatePresence(false));
        window.addEventListener("pagehide", () => updatePresence(false));
        document.addEventListener("visibilitychange", () => {
            if(document.visibilityState === 'visible'){
                updatePresence(true);
            } else {
                updatePresence(false);
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            updatePresence(false);
            signOut(auth).catch(console.error);
        });

        // --- IN-APP CALL MODULE ---
        const secureRoomName = "ChatApp_Global_Room_9988"; 

        function startInAppCall(muteVideoState) {
            callOverlay.style.display = 'flex'; 
            const domain = "meet.jit.si";
            const options = {
                roomName: secureRoomName, width: "100%", height: "100%",
                parentNode: document.getElementById("meetContainer"),
                configOverwrite: { startWithVideoMuted: muteVideoState, startWithAudioMuted: false, prejoinPageEnabled: false },
                interfaceConfigOverwrite: { TOOLBAR_BUTTONS: ['microphone', 'camera', 'tileview', 'hangup'] }
            };
            jitsiAPI = new JitsiMeetExternalAPI(domain, options);
            jitsiAPI.addEventListener('videoConferenceLeft', () => { endCallSession(); });
        }

        function endCallSession() {
            if (jitsiAPI) { jitsiAPI.dispose(); jitsiAPI = null; }
            document.getElementById("meetContainer").innerHTML = "";
            callOverlay.style.display = 'none'; 
        }

        document.getElementById('videoCallBtn').addEventListener('click', () => startInAppCall(false));
        document.getElementById('voiceCallBtn').addEventListener('click', () => startInAppCall(true)); 
        document.getElementById('endCallBtn').addEventListener('click', endCallSession);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user.email.split('@')[0];
                document.getElementById('myProfileText').innerText = currentUser;
                document.getElementById('headerAvatar').innerText = currentUser.charAt(0);
                
                authScreen.style.display = 'none'; 
                chatAppUI.style.display = 'flex';  
                usernameInput.value = ''; passwordInput.value = '';
                mainAuthBtn.innerText = "Log In";
                
                startAppListeners();
            } else {
                currentUser = null;
                authScreen.style.display = 'flex'; 
                chatAppUI.style.display = 'none';  
                mainAuthBtn.innerText = "Log In";
            }
        });

        function formatTime(date) {
            if (!date) return '';
            let h = date.getHours(), m = date.getMinutes(), ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12; m = m < 10 ? '0' + m : m;
            return `${h}:${m} ${ampm}`;
        }

        // --- DATE & TIME PARSER (Fixed for Last Seen Feature) ---
        function parseLastSeen(timestamp) {
            if (!timestamp) return 'Offline';
            
            const date = new Date(timestamp);
            const now = new Date();
            const isToday = date.toDateString() === now.toDateString();

            let h = date.getHours(), m = date.getMinutes(), ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12; m = m < 10 ? '0' + m : m;
            const timeStr = `${h}:${m} ${ampm}`;

            if (isToday) {
                return `Today, ${timeStr}`;
            } else {
                const d = date.getDate();
                const mth = date.toLocaleString('default', { month: 'short' }); // Jaise 'Jul'
                return `${d} ${mth}, ${timeStr}`; // Out: "6 Jul, 05:30 PM"
            }
        }

        function startAppListeners() {
            updatePresence(true);

            // Fetch Online Users & Last Seen
            onSnapshot(collection(db, "active_users"), (snapshot) => {
                onlineUsersList.innerHTML = '';
                snapshot.forEach(d => {
                    const data = d.data();
                    const name = data.name === currentUser ? 'You' : data.name;
                    
                    let statusHTML = '';
                    let borderClass = 'offline';
                    
                    if (data.isOnline) {
                        statusHTML = `<span class="user-status-small online">🟢 Online</span>`;
                        borderClass = 'online';
                    } else {
                        const formattedTime = parseLastSeen(data.lastSeen);
                        statusHTML = `<span class="user-status-small offline">${formattedTime}</span>`;
                        borderClass = 'offline';
                    }

                    onlineUsersList.innerHTML += `
                        <div class="online-user">
                            <div class="avatar-circle ${borderClass}">${data.name.charAt(0)}</div>
                            <span class="user-name-small">${name}</span>
                            ${statusHTML}
                        </div>
                    `;
                });
            });

            // Typing Indicator
            onSnapshot(collection(db, "typing_status"), (snapshot) => {
                let typingNames = [];
                snapshot.forEach(d => {
                    if (d.data().isTyping && d.id !== currentUser) typingNames.push(d.id);
                });
                typingIndicator.style.display = typingNames.length > 0 ? 'block' : 'none';
                if(typingNames.length > 0) typingIndicator.innerText = `${typingNames.join(', ')} is typing...`;
            });

            // Fetch Chat Messages
            onSnapshot(query(collection(db, "messages"), orderBy("timestamp", "asc")), (snapshot) => {
                chatBody.innerHTML = '';
                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    const isMe = data.sender === currentUser;
                    let mediaHTML = '';
                    
                    if (data.mediaUrl) {
                        if (data.mediaType === 'image') mediaHTML = `<img src="${data.mediaUrl}" alt="image">`;
                        else if (data.mediaType === 'video') mediaHTML = `<video src="${data.mediaUrl}" controls></video>`;
                        else mediaHTML = `<a href="${data.mediaUrl}" target="_blank" class="file-link">📎 Download File</a>`;
                    }

                    const delBtn = isMe ? `<button class="delete-btn" data-id="${docSnap.id}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>` : '';

                    chatBody.innerHTML += `
                        <div class="msg ${isMe ? 'sent' : 'received'}">
                            ${!isMe ? `<span class="sender">${data.sender}</span>` : ''}
                            ${data.text ? `<div>${data.text}</div>` : ''}
                            ${mediaHTML}
                            <div class="msg-footer">
                                <span class="time">${data.timestamp ? formatTime(data.timestamp.toDate()) : '...'}</span>
                                ${delBtn}
                            </div>
                        </div>
                    `;
                });
                chatBody.scrollTop = chatBody.scrollHeight;
            });
        }

        async function sendMessage(text, url = null, type = null) {
            if (!text && !url) return;
            messageInput.value = ''; sendBtn.classList.remove('active');
            if (currentUser) setDoc(doc(db, "typing_status", currentUser), { isTyping: false }).catch(console.error);
            await addDoc(collection(db, "messages"), { sender: currentUser, text: text, mediaUrl: url, mediaType: type, timestamp: serverTimestamp() });
        }
        
        sendBtn.addEventListener('click', () => sendMessage(messageInput.value.trim()));
        messageInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(messageInput.value.trim()); });

        // --- 🔥 100% FREE CLOUDINARY UPLOAD PIPELINE ---
        
        // Yahan Apna Cloudinary Setting Set Hai
        const cloudName = 'dqzx541to';         
        const uploadPreset = 'chat_upload';    
        
        document.getElementById('attachBtn').addEventListener('click', () => fileInput.click());
        
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            let type = 'raw';
            if (file.type.startsWith('image/')) type = 'image';
            else if (file.type.startsWith('video/')) type = 'video';

            const statusDiv = document.getElementById('uploadStatus');
            statusDiv.style.display = 'block';
            statusDiv.innerText = 'Uploading Media... Please wait.';

            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', uploadPreset);

            try {
                // Cloudinary Direct Upload API
                const response = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/${type}/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();

                if (data.secure_url) {
                    statusDiv.style.display = 'none';
                    sendMessage('', data.secure_url, type); 
                    fileInput.value = '';
                } else {
                    console.error("Cloudinary Error: ", data);
                    throw new Error("Upload configuration error");
                }
            } catch (error) {
                console.error("Upload Error: ", error);
                statusDiv.style.display = 'none';
                alert("Upload failed! Please check your Cloudinary Preset Name.");
            }
        });

        // Delete Message System
        let msgIdToDelete = null;
        chatBody.addEventListener('click', (e) => {
            const btn = e.target.closest('.delete-btn');
            if (btn) {
                msgIdToDelete = btn.getAttribute('data-id');
                deleteModal.style.display = 'flex';
            }
        });
        document.getElementById('cancelDeleteBtn').addEventListener('click', () => { deleteModal.style.display = 'none'; msgIdToDelete = null; });
        document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
            if (msgIdToDelete) {
                await deleteDoc(doc(db, "messages", msgIdToDelete));
                deleteModal.style.display = 'none'; msgIdToDelete = null;
            }
        });
    </script>
</body>
</html>
