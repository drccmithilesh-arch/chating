<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VibeChat - All Features</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Grand+Hotel&family=Inter:wght@400;500;600&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; overflow: hidden; background-color: #FAFAFA; font-family: 'Inter', sans-serif; }

        .app-container {
            display: flex; flex-direction: column; height: 100dvh; max-width: 500px;
            margin: 0 auto; background: #ffffff; position: relative; box-shadow: 0 0 15px rgba(0,0,0,0.05);
        }

        /* --- 🔐 AUTH SCREEN --- */
        .auth-screen { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: #FAFAFA; display: flex; flex-direction: column; z-index: 200; overflow-y: auto; }
        .auth-main-content { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; width: 100%; }
        .auth-box { background: #FFFFFF; border: 1px solid #DBDBDB; padding: 40px; width: 100%; max-width: 350px; display: flex; flex-direction: column; align-items: center; border-radius: 2px; }
        .auth-logo { font-family: 'Grand Hotel', cursive; font-size: 50px; margin-bottom: 35px; color: #000; letter-spacing: 1px; line-height: 1; }
        .input-group { width: 100%; margin-bottom: 8px; }
        .auth-input { width: 100%; padding: 12px 15px; border: 1px solid #DBDBDB; border-radius: 4px; background: #FAFAFA; font-size: 14px; outline: none; transition: 0.2s; }
        .auth-input:focus { border-color: #A8A8A8; background: #FFFFFF; }
        .auth-btn { width: 100%; background: #4CB5F9; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 15px; transition: 0.2s; }
        .auth-btn.active-btn { background: #0095F6; }
        .auth-error { color: #ED4956; font-size: 13px; margin-top: 15px; text-align: center; display: none; }
        .switch-box { background: #FFFFFF; border: 1px solid #DBDBDB; padding: 20px; width: 100%; max-width: 350px; text-align: center; font-size: 14px; margin: 0 auto 20px auto; }
        .switch-link { color: #0095F6; font-weight: 600; cursor: pointer; margin-left: 5px; }

        @media (max-width: 450px) {
            .auth-screen { background: #FFFFFF; }
            .auth-main-content { justify-content: flex-start; margin-top: 50px; }
            .auth-box { border: none; padding: 20px; max-width: 100%; }
            .switch-box { border: none; border-top: 1px solid #DBDBDB; margin: auto 0 0 0; max-width: 100%; padding: 18px 0; }
        }

        /* --- 💬 MAIN CHAT APP UI --- */
        .chat-app-ui { display: none; flex-direction: column; height: 100%; }

        /* Header */
        .header { background: #ffffff; border-bottom: 1px solid #DBDBDB; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; z-index: 20; }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header-avatar { width: 35px; height: 35px; background: #E0F2FE; color: #0284C7; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; text-transform: uppercase; }
        .header-info h2 { font-size: 16px; font-weight: 600; color: #262626; }
        .header-info p { font-size: 11px; color: #10B981; font-weight: 600; }
        
        .header-icons { display: flex; gap: 15px; align-items: center; }
        .icon-btn { background: none; border: none; color: #262626; cursor: pointer; display: flex; }

        /* Online Users Tray */
        .online-tray { background: #FAFAFA; padding: 10px 15px; display: flex; gap: 12px; overflow-x: auto; border-bottom: 1px solid #DBDBDB; }
        .online-tray::-webkit-scrollbar { display: none; }
        .online-user { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 45px; }
        .avatar-circle { width: 42px; height: 42px; border-radius: 50%; background: #E0F2FE; color: #0284C7; display: flex; justify-content: center; align-items: center; font-weight: bold; border: 2px solid #10B981; text-transform: uppercase; }
        .user-name-small { font-size: 10px; color: #262626; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 50px; }

        /* Chat Body */
        .chat-body { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-color: #FFFFFF; }
        .msg { max-width: 75%; padding: 10px 12px; border-radius: 18px; font-size: 14px; position: relative; line-height: 1.4; word-wrap: break-word; }
        .msg.sent { background: #EFEFEF; align-self: flex-end; color: #262626; border-bottom-right-radius: 4px; } 
        .msg.received { background: #FFFFFF; align-self: flex-start; border: 1px solid #DBDBDB; color: #262626; border-bottom-left-radius: 4px; } 
        .sender { font-size: 11px; font-weight: 600; color: #8E8E8E; margin-bottom: 3px; display: block; }
        
        /* Media */
        .msg img, .msg video { max-width: 100%; border-radius: 8px; margin-top: 5px; background: #ddd; }
        .msg .file-link { display: inline-flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.05); padding: 8px; border-radius: 8px; text-decoration: none; color: #0095F6; font-weight: 500; font-size: 13px; margin-top: 5px; }

        /* Message Footer */
        .msg-footer { display: flex; justify-content: flex-end; align-items: center; gap: 8px; margin-top: 4px; }
        .time { font-size: 10px; color: #8E8E8E; }
        .delete-btn { background: none; border: none; cursor: pointer; color: #ED4956; padding: 2px; opacity: 0.7; }
        
        /* Footer Input Area */
        .footer { background: #FFFFFF; border-top: 1px solid #DBDBDB; padding: 10px 15px; display: flex; gap: 8px; align-items: center; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        .attach-btn { background: none; border: none; color: #262626; cursor: pointer; padding: 5px; }
        .input-box { flex: 1; background: #EFEFEF; border: 1px solid transparent; border-radius: 20px; padding: 10px 15px; outline: none; font-size: 14px; }
        .input-box:focus { border-color: #DBDBDB; background: #FFFFFF; }
        .send-btn { background: transparent; color: #0095F6; border: none; font-weight: 600; font-size: 14px; cursor: pointer; opacity: 0.5; }
        .send-btn.active { opacity: 1; }

        /* Upload Status */
        .uploading { text-align: center; font-size: 12px; color: #0095F6; font-weight: bold; display: none; padding: 5px; background: #FAFAFA; border-bottom: 1px solid #DBDBDB;}

        /* Delete Modal */
        .modal-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); display: none; justify-content: center; align-items: center; z-index: 300; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 80%; max-width: 300px; text-align: center; }
        .modal-actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn-cancel { flex: 1; padding: 10px; border: none; border-radius: 8px; background: #F3F4F6; font-weight: 600; cursor: pointer; }
        .btn-danger { flex: 1; padding: 10px; border: none; border-radius: 8px; background: #ED4956; color: white; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div id="authScreen" class="auth-screen">
            <div class="auth-main-content">
                <div class="auth-box">
                    <div class="auth-logo">VibeChat</div>
                    <div class="input-group"><input type="text" id="usernameInput" class="auth-input" placeholder="Username" autocomplete="off"></div>
                    <div class="input-group"><input type="password" id="passwordInput" class="auth-input" placeholder="Password"></div>
                    <button id="mainAuthBtn" class="auth-btn">Log In</button>
                    <div id="authError" class="auth-error">Error message</div>
                </div>
            </div>
            <div class="switch-box">
                <span id="switchText">Don't have an account?</span> 
                <span id="switchBtn" class="switch-link">Sign up</span>
            </div>
        </div>

        <div id="chatAppUI" class="chat-app-ui">
            
            <div class="header">
                <div class="header-left">
                    <div class="header-avatar" id="headerAvatar">U</div>
                    <div class="header-info">
                        <h2 id="myProfileText">Username</h2>
                        <p>🟢 Online</p>
                    </div>
                </div>
                <div class="header-icons">
                    <button class="icon-btn" onclick="alert('Live Video Calling integration with ZegoCloud coming soon!')">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
                    </button>
                    <button class="icon-btn" onclick="alert('Voice Calling integration coming soon!')">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                    </button>
                    <button id="logoutBtn" class="icon-btn" style="color: #ED4956;" title="Log Out">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    </button>
                </div>
            </div>

            <div class="online-tray" id="onlineUsersList">
                <div style="font-size: 11px; color: #8E8E8E; padding: 10px;">Loading users...</div>
            </div>

            <div id="uploadStatus" class="uploading">Uploading media... Please wait.</div>

            <div class="chat-body" id="chatBody"></div>

            <input type="file" id="fileInput" style="display: none;" accept="image/*,video/*,.pdf,.doc,.docx">

            <div class="footer">
                <button class="attach-btn" id="attachBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                </button>
                <input type="text" id="messageInput" class="input-box" placeholder="Message..." autocomplete="off">
                <button id="sendBtn" class="send-btn">Post</button>
            </div>
        </div>

        <div id="deleteModal" class="modal-overlay">
            <div class="modal-content">
                <h3 style="font-size: 16px; margin-bottom: 5px;">Delete Message?</h3>
                <p style="font-size: 12px; color: #8E8E8E;">This will delete it for everyone.</p>
                <div class="modal-actions">
                    <button id="cancelDeleteBtn" class="btn-cancel">Cancel</button>
                    <button id="confirmDeleteBtn" class="btn-danger">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        // 🔥 APNI KEYS
        const firebaseConfig = {
            apiKey: "AIzaSyB6OBfN-UovERSSQUuVKLQaEvDeko96CpA",
            authDomain: "chating-576a3.firebaseapp.com",
            projectId: "chating-576a3",
            storageBucket: "chating-576a3.firebasestorage.app",
            messagingSenderId: "419008189208",
            appId: "1:419008189208:web:f340c72c97c7978c3e846d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app); 
        const storage = getStorage(app); 

        let currentUser = null; 
        let chatUnsubscribe = null;
        let onlineUnsubscribe = null;
        let isLoginMode = true; 

        // Elements
        const authScreen = document.getElementById('authScreen');
        const chatAppUI = document.getElementById('chatAppUI');
        const usernameInput = document.getElementById('usernameInput');
        const passwordInput = document.getElementById('passwordInput');
        const mainAuthBtn = document.getElementById('mainAuthBtn');
        const authError = document.getElementById('authError');
        const chatBody = document.getElementById('chatBody');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const fileInput = document.getElementById('fileInput');
        const onlineUsersList = document.getElementById('onlineUsersList');
        const uploadStatus = document.getElementById('uploadStatus');
        const deleteModal = document.getElementById('deleteModal');

        // Toggle UI
        document.getElementById('switchBtn').addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            authError.style.display = 'none';
            if(isLoginMode) {
                mainAuthBtn.innerText = "Log In";
                document.getElementById('switchText').innerText = "Don't have an account?";
                document.getElementById('switchBtn').innerText = "Sign up";
            } else {
                mainAuthBtn.innerText = "Sign Up";
                document.getElementById('switchText').innerText = "Have an account?";
                document.getElementById('switchBtn').innerText = "Log in";
            }
        });

        function checkInputs() {
            if(usernameInput.value.trim().length > 0 && passwordInput.value.trim().length > 5) mainAuthBtn.classList.add('active-btn');
            else mainAuthBtn.classList.remove('active-btn');
        }
        usernameInput.addEventListener('input', checkInputs);
        passwordInput.addEventListener('input', checkInputs);
        messageInput.addEventListener('input', () => {
            if(messageInput.value.trim().length > 0) sendBtn.classList.add('active');
            else sendBtn.classList.remove('active');
        });

        function showError(msg) { authError.innerText = msg; authError.style.display = 'block'; }

        // --- 1. LOGIN / SIGNUP ---
        mainAuthBtn.addEventListener('click', async () => {
            const rawUsername = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            if (!rawUsername || !password) return showError("Please fill all fields.");
            
            mainAuthBtn.innerText = "Please wait...";
            const dummyEmail = rawUsername.toLowerCase().replace(/\s+/g, '') + "@vibechat.com";

            try {
                if(isLoginMode) await signInWithEmailAndPassword(auth, dummyEmail, password);
                else await createUserWithEmailAndPassword(auth, dummyEmail, password);
            } catch (error) {
                mainAuthBtn.innerText = isLoginMode ? "Log In" : "Sign Up";
                showError(error.message.replace("Firebase: ", ""));
            }
        });


        // --- SMART PRESENCE SYSTEM (Fixes the Ghost Users Issue) ---
        function updateOnlineStatus(isOnline) {
            if (currentUser) {
                // Set merge: true so it doesn't overwrite other data if added later
                setDoc(doc(db, "active_users", currentUser), { 
                    name: currentUser, 
                    isOnline: isOnline 
                }, { merge: true }).catch(console.error);
            }
        }

        // Trigger when closing tab / refreshing
        window.addEventListener("beforeunload", () => updateOnlineStatus(false));
        window.addEventListener("pagehide", () => updateOnlineStatus(false));
        
        // Trigger when minimizing app / locking phone
        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === 'visible') {
                updateOnlineStatus(true);
            } else {
                updateOnlineStatus(false);
            }
        });


        // --- 2. LOGOUT ---
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            updateOnlineStatus(false); // Make offline before logout
            signOut(auth);
        });

        // --- AUTH STATE CHANGED ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user.email.split('@')[0];
                document.getElementById('myProfileText').innerText = currentUser;
                document.getElementById('headerAvatar').innerText = currentUser.charAt(0);
                
                authScreen.style.display = 'none'; 
                chatAppUI.style.display = 'flex';  
                usernameInput.value = ''; passwordInput.value = '';
                
                startChatSystem(); 
            } else {
                currentUser = null;
                if (chatUnsubscribe) chatUnsubscribe();
                if (onlineUnsubscribe) onlineUnsubscribe();
                authScreen.style.display = 'flex'; 
                chatAppUI.style.display = 'none';  
                mainAuthBtn.innerText = "Log In";
            }
        });

        function formatTime(date) {
            if (!date) return '';
            let h = date.getHours(); let m = date.getMinutes();
            const ampm = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12; m = m < 10 ? '0' + m : m;
            return `${h}:${m} ${ampm}`;
        }

        function startChatSystem() {
            // First time making user online
            updateOnlineStatus(true);

            // LISTEN ONLINE USERS (Filters only real online users)
            onlineUnsubscribe = onSnapshot(query(collection(db, "active_users")), (snapshot) => {
                onlineUsersList.innerHTML = '';
                
                let onlineCount = 0;
                snapshot.forEach((userDoc) => {
                    const userData = userDoc.data();
                    
                    // 👉 Yeh Line Purane/Offline Users ko chhupa degi
                    if (userData.isOnline) {
                        onlineCount++;
                        const displayName = userData.name === currentUser ? 'You' : userData.name;
                        const userDiv = document.createElement('div');
                        userDiv.className = 'online-user';
                        userDiv.innerHTML = `<div class="avatar-circle">${userData.name.charAt(0)}</div><span class="user-name-small">${displayName}</span>`;
                        onlineUsersList.appendChild(userDiv);
                    }
                });

                if(onlineCount === 0) {
                    onlineUsersList.innerHTML = '<div style="font-size: 11px; color: #8E8E8E; padding: 10px;">No one is online</div>';
                }
            });

            // LISTEN MESSAGES
            chatUnsubscribe = onSnapshot(query(collection(db, "messages"), orderBy("timestamp", "asc")), (snapshot) => {
                chatBody.innerHTML = '';
                snapshot.forEach((msgSnapshot) => {
                    const data = msgSnapshot.data();
                    const isMe = data.sender === currentUser;
                    const timeStr = data.timestamp ? formatTime(data.timestamp.toDate()) : '...';
                    const docId = msgSnapshot.id;

                    const msgDiv = document.createElement('div');
                    msgDiv.className = `msg ${isMe ? 'sent' : 'received'}`;
                    
                    let contentHTML = data.text ? `<div>${data.text}</div>` : '';
                    if (data.mediaUrl) {
                        if (data.mediaType === 'image') contentHTML += `<img src="${data.mediaUrl}" alt="Photo">`;
                        else if (data.mediaType === 'video') contentHTML += `<video src="${data.mediaUrl}" controls></video>`;
                        else contentHTML += `<a href="${data.mediaUrl}" target="_blank" class="file-link">📎 View File</a>`;
                    }

                    let deleteIconHTML = isMe ? `<button class="delete-btn" data-id="${docId}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>` : '';

                    msgDiv.innerHTML = `
                        ${!isMe ? `<span class="sender">${data.sender}</span>` : ''}
                        ${contentHTML}
                        <div class="msg-footer"><span class="time">${timeStr}</span>${deleteIconHTML}</div>
                    `;
                    chatBody.appendChild(msgDiv);
                });
                chatBody.scrollTop = chatBody.scrollHeight;
            });
        }

        // --- 3. SEND MESSAGE ---
        async function sendMessage(text, mediaUrl = null, mediaType = null) {
            if (!text && !mediaUrl) return;
            messageInput.value = ''; sendBtn.classList.remove('active');
            try {
                await addDoc(collection(db, "messages"), {
                    sender: currentUser, text: text, mediaUrl: mediaUrl, mediaType: mediaType, timestamp: serverTimestamp()
                });
            } catch (error) { console.error("Send Error:", error); }
        }
        sendBtn.addEventListener('click', () => sendMessage(messageInput.value.trim()));
        messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(messageInput.value.trim()); });

        // --- 4. FILE UPLOAD ---
        document.getElementById('attachBtn').addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            let fileType = 'file';
            if (file.type.startsWith('image/')) fileType = 'image';
            else if (file.type.startsWith('video/')) fileType = 'video';

            const storageRef = ref(storage, `chat_media/${Date.now()}_${file.name}`);
            const uploadTask = uploadBytesResumable(storageRef, file);

            uploadStatus.style.display = 'block'; 
            uploadTask.on('state_changed', 
                (snapshot) => { uploadStatus.innerText = `Uploading: ${Math.round((snapshot.bytesTransferred / snapshot.totalBytes) * 100)}%`; }, 
                (error) => { console.error(error); uploadStatus.style.display = 'none'; alert("Upload failed."); }, 
                async () => {
                    const downloadURL = await getDownloadURL(uploadTask.snapshot.ref);
                    uploadStatus.style.display = 'none';
                    sendMessage('', downloadURL, fileType); 
                    fileInput.value = ''; 
                }
            );
        });

        // --- 5. DELETE MESSAGE ---
        let messageToDelete = null;
        chatBody.addEventListener('click', (e) => {
            const deleteBtn = e.target.closest('.delete-btn');
            if (deleteBtn) {
                messageToDelete = deleteBtn.getAttribute('data-id');
                deleteModal.style.display = 'flex';
            }
        });
        document.getElementById('cancelDeleteBtn').addEventListener('click', () => { deleteModal.style.display = 'none'; messageToDelete = null; });
        document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
            if (messageToDelete) {
                await deleteDoc(doc(db, "messages", messageToDelete));
                deleteModal.style.display = 'none'; messageToDelete = null;
            }
        });
    </script>
</body>
</html>
