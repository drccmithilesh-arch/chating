<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <title>Mi Massage</title>
    <script src="https://meet.jit.si/external_api.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Grand+Hotel&family=Inter:wght@400;500;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            width: 100vw; 
            height: 100dvh; 
            overflow: hidden; 
            position: fixed; 
            background-color: #FAFAFA; 
            font-family: 'Inter', sans-serif; 
        }

        .app-container { display: flex; flex-direction: column; width: 100%; height: 100%; max-width: 500px; margin: 0 auto; background: #ffffff; position: relative; box-shadow: 0 0 15px rgba(0,0,0,0.05); }

        /* --- 🔐 AUTH SCREEN --- */
        .auth-screen { position: absolute; inset: 0; background: #FAFAFA; display: flex; flex-direction: column; z-index: 200; overflow-y: auto; align-items: center; justify-content: center; padding: 20px; }
        .auth-logo { font-family: 'Grand Hotel', cursive; font-size: 55px; margin-bottom: 40px; color: #111827; letter-spacing: 1px; line-height: 1; }
        .auth-box { background: #FFFFFF; border: 1px solid #E5E7EB; padding: 30px 25px; width: 100%; max-width: 350px; display: flex; flex-direction: column; align-items: center; border-radius: 8px; margin-bottom: 20px; }
        .input-group { width: 100%; margin-bottom: 15px; }
        .auth-input { width: 100%; padding: 14px 15px; border: 1px solid #E5E7EB; border-radius: 6px; background: #FAFAFA; font-size: 14px; outline: none; transition: 0.2s; color: #111827; }
        .auth-input:focus { border-color: #9CA3AF; background: #FFFFFF; }
        .auth-input::placeholder { color: #9CA3AF; }
        .auth-btn { width: 100%; background: #93C5FD; color: white; border: none; padding: 14px; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 5px; transition: 0.3s; }
        .auth-btn.active-btn { background: #3B82F6; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3); }
        .auth-error { color: #EF4444; font-size: 13px; margin-top: 15px; text-align: center; display: none; line-height: 1.4; font-weight: 500; }
        .switch-box { background: #FFFFFF; border: 1px solid #E5E7EB; padding: 20px; width: 100%; max-width: 350px; text-align: center; font-size: 14px; border-radius: 8px; color: #6B7280; }
        .switch-link { color: #0095F6; font-weight: 600; cursor: pointer; margin-left: 5px; text-decoration: none; }

        /* --- 📱 VIEW 1: HOME --- */
        .home-view { display: none; flex-direction: column; height: 100%; }
        .main-header, .chat-header { flex-shrink: 0; background: #ffffff; border-bottom: 1px solid #E5E7EB; padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 20; }
        .main-header-left { display: flex; align-items: center; gap: 12px; }
        .main-avatar { width: 40px; height: 40px; background: #111827; color: #ffffff; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; text-transform: uppercase; font-size: 18px; }
        .main-info h2 { font-size: 18px; font-weight: 700; color: #111827; text-transform: capitalize; }
        .main-info p { font-size: 12px; color: #10B981; font-weight: 600; }
        .icon-btn { background: none; border: none; cursor: pointer; display: flex; padding: 5px; transition: 0.2s; align-items: center; justify-content: center; color: #111827; }

        .contact-list { flex-grow: 1; overflow-y: auto; background: #ffffff; display: flex; flex-direction: column; -webkit-overflow-scrolling: touch; }
        .contact-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #F3F4F6; cursor: pointer; gap: 15px; transition: background 0.2s; position: relative; }
        .contact-item:active { background: #F9FAFB; }
        .contact-avatar { width: 50px; height: 50px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; font-weight: bold; text-transform: uppercase; }
        .contact-avatar.online { border: 2px solid #10B981; background: #E0F2FE; color: #0284C7; }
        .contact-avatar.offline { border: 2px solid #D1D5DB; background: #F3F4F6; color: #9CA3AF; }
        .contact-info-col { flex: 1; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
        .contact-name { font-size: 16px; font-weight: 600; color: #111827; text-transform: capitalize; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .contact-status { font-size: 13px; color: #6B7280; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .contact-status.online { color: #10B981; font-weight: 500; }
        .new-msg-badge { background: #10B981; color: white; font-size: 11px; font-weight: bold; padding: 4px 8px; border-radius: 12px; margin-left: auto; box-shadow: 0 2px 5px rgba(16, 185, 129, 0.4); }

        /* --- 💬 VIEW 2: CHAT INTERFACE --- */
        .chat-view { display: none; flex-direction: column; height: 100%; position: relative; }
        .chat-header-left { display: flex; align-items: center; gap: 12px; }
        .back-btn { background: none; border: none; font-size: 22px; color: #111827; cursor: pointer; padding: 5px 10px 5px 0; display: flex; align-items: center; }
        .chat-header-avatar { width: 40px; height: 40px; background: #E0F2FE; color: #0284C7; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; text-transform: uppercase; font-size: 18px; }
        .chat-header-info { display: flex; flex-direction: column; }
        .chat-header-info h2 { font-size: 16px; font-weight: 600; color: #111827; text-transform: capitalize; margin-bottom: 2px; }
        .chat-header-info p { font-size: 12px; font-weight: 500; color: #6B7280; transition: 0.3s; }
        .chat-header-icons { display: flex; gap: 15px; align-items: center; }

        .chat-body { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background-color: #FAFAFA; -webkit-overflow-scrolling: touch; }
        .msg { max-width: 78%; padding: 10px 14px; border-radius: 18px; font-size: 14px; position: relative; line-height: 1.4; word-wrap: break-word; display: flex; flex-direction: column; }
        .msg.sent { background: #EFEFEF; align-self: flex-end; color: #262626; border-bottom-right-radius: 4px; } 
        .msg.received { background: #FFFFFF; align-self: flex-start; border: 1px solid #DBDBDB; color: #262626; border-bottom-left-radius: 4px; } 
        .msg img, .msg video { max-width: 100%; border-radius: 8px; margin-top: 5px; display: block; object-fit: cover; max-height: 250px; background: #ddd; }
        .msg .file-link { color: #0095F6; text-decoration: none; font-weight: 500; font-size: 13px; display: inline-flex; align-items: center; gap: 5px; margin-top: 5px; }
        .msg-footer { display: flex; justify-content: flex-end; align-items: center; gap: 8px; margin-top: 4px; width: 100%; }
        .time { font-size: 10px; color: #8E8E8E; }
        .delete-btn { background: none; border: none; cursor: pointer; color: #ED4956; padding: 2px; opacity: 0.7; display: flex; align-items: center; }

        .uploading { text-align: center; font-size: 12px; color: #0095F6; font-weight: bold; display: none; padding: 8px; background: #F0F9FF; border-bottom: 1px solid #DBDBDB; }
        .typing-indicator { font-size: 12px; color: #0095F6; padding: 8px 15px; display: none; font-style: italic; background: #FAFAFA; border-top: 1px solid #DBDBDB; }

        .footer { flex-shrink: 0; background: #FFFFFF; border-top: 1px solid #DBDBDB; padding: 10px 15px; display: flex; gap: 12px; align-items: center; padding-bottom: calc(10px + env(safe-area-inset-bottom)); position: relative; z-index: 10; }
        .icon-btn-footer { background: none; border: none; font-size: 22px; cursor: pointer; padding: 5px; display: flex; align-items: center; justify-content: center; color: #262626; }
        .input-box { flex: 1; background: #EFEFEF; border: 1px solid transparent; border-radius: 20px; padding: 10px 15px; outline: none; font-size: 14px; color: #111827; }
        .input-box:focus { border-color: #DBDBDB; background: #FFFFFF; }
        .send-btn { background: transparent; color: #0095F6; border: none; font-weight: 600; font-size: 15px; cursor: pointer; opacity: 0.5; transition: 0.2s; }
        .send-btn.active { opacity: 1; }

        /* --- 🚨 CALL POPUPS --- */
        .incoming-call-box { position: absolute; inset: 0; background: rgba(17, 24, 39, 0.96); z-index: 300; display: none; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; animation: pulseBg 2s infinite; }
        .caller-avatar-large { width: 100px; height: 100px; background: #0095F6; border-radius: 50%; font-size: 40px; font-weight: bold; display: flex; justify-content: center; align-items: center; text-transform: uppercase; margin-bottom: 20px; box-shadow: 0 0 25px rgba(0, 149, 246, 0.6); }
        .call-action-btns { display: flex; gap: 40px; margin-top: 50px; }
        .circle-action-btn { width: 65px; height: 65px; border-radius: 50%; border: none; cursor: pointer; font-size: 24px; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: 0.2s; }
        .circle-action-btn.accept { background: #10B981; color: white; }
        .circle-action-btn.decline { background: #EF4444; color: white; }
        
        /* 📞 CALL OVERLAY & VIDEO SWAP LOGIC */
        .call-overlay { 
            position: absolute; top: 75px; right: 15px; width: 160px; height: 220px; 
            background: #111111; z-index: 250; display: none; flex-direction: column; 
            border-radius: 12px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.4); 
            border: 2px solid #374151; cursor: grab; /* Added grab cursor */
        }
        .call-overlay:active { cursor: grabbing; } /* Added grabbing cursor */
        .call-overlay.fullscreen { 
            top: 0; right: 0; bottom: 0; left: 0; width: 100%; height: 100%; 
            border-radius: 0; border: none; z-index: 400; transform: none !important; cursor: default;
        }
        .video-container { flex: 1; position: relative; background: #000; display: flex; justify-content: center; align-items: center; overflow: hidden; pointer-events: none; }
        
        /* Normal State */
        #remoteVideo { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; transition: 0.3s; cursor: pointer; pointer-events: auto; }
        #localVideo { position: absolute; top: 5px; right: 5px; width: 40px; height: 60px; background: #333; border-radius: 6px; border: 1px solid white; object-fit: cover; z-index: 5; box-shadow: 0 2px 5px rgba(0,0,0,0.5); transform: scaleX(-1); transition: 0.3s; cursor: pointer; pointer-events: auto; }
        .call-overlay.fullscreen #localVideo { width: 100px; height: 140px; top: auto; bottom: 100px; right: 20px; border-radius: 10px; } 
        
        /* Swapped State (User tapped the small video) */
        .video-container.swapped #localVideo { width: 100%; height: 100%; top: 0; right: 0; bottom: 0; left: 0; border-radius: 0; border: none; box-shadow: none; z-index: 1; }
        .video-container.swapped #remoteVideo { top: 5px; right: 5px; bottom: auto; left: auto; width: 40px; height: 60px; border-radius: 6px; border: 1px solid white; z-index: 5; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .call-overlay.fullscreen .video-container.swapped #remoteVideo { width: 100px; height: 140px; top: auto; bottom: 100px; right: 20px; border-radius: 10px; }

        .call-controls { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); z-index: 15; display: flex; gap: 8px; align-items: center; width: 100%; justify-content: center; pointer-events: auto; }
        .call-overlay.fullscreen .call-controls { gap: 20px; bottom: 30px; }

        .action-call-btn { width: 32px; height: 32px; border-radius: 50%; border: none; color: white; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .call-overlay.fullscreen .action-call-btn { width: 50px; height: 50px; }
        
        .toggle-screen-btn { background: rgba(255,255,255,0.2); backdrop-filter: blur(5px); }
        .end-call-btn { background: #EF4444; }

        #callStatus { position: absolute; top: 5px; left: 5px; color: white; font-weight: bold; background: rgba(0,0,0,0.6); padding: 3px 6px; border-radius: 6px; z-index: 10; font-size: 9px; white-space: nowrap; max-width: 80px; overflow: hidden; text-overflow: ellipsis; transition: 0.3s; pointer-events: none; }
        .call-overlay.fullscreen #callStatus { top: 20px; left: 20px; font-size: 13px; padding: 6px 12px; max-width: none; }

        /* Modals */
        .modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(2px); display: none; justify-content: center; align-items: center; z-index: 300; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 80%; max-width: 300px; text-align: center; }
        .modal-actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn-cancel { flex: 1; padding: 10px; border: none; border-radius: 8px; background: #F3F4F6; font-weight: 600; cursor: pointer; color: #4B5563; }
        .btn-danger { flex: 1; padding: 10px; border: none; border-radius: 8px; background: #ED4956; color: white; font-weight: 600; cursor: pointer; }

        @keyframes pulseBg { 0% { background-color: rgba(17, 24, 39, 0.96); } 50% { background-color: rgba(15, 23, 42, 0.98); } 100% { background-color: rgba(17, 24, 39, 0.96); } }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- 🔐 AUTH SCREEN (MI MASSAGE UI) -->
        <div id="authScreen" class="auth-screen">
            <div class="auth-logo">Mi Massage</div>
            <div class="auth-box">
                <div class="input-group"><input type="text" id="usernameInput" class="auth-input" placeholder="Username" autocomplete="off"></div>
                <div class="input-group"><input type="password" id="passwordInput" class="auth-input" placeholder="Password"></div>
                <button id="mainAuthBtn" class="auth-btn">Log In</button>
                <div id="authError" class="auth-error">Error message</div>
            </div>
            <div class="switch-box">
                <span id="switchText">Don't have an account?</span> 
                <span id="switchBtn" class="switch-link">Sign up</span>
            </div>
        </div>

        <!-- 🚨 INCOMING CALL POPUP -->
        <div id="incomingCallBox" class="incoming-call-box">
            <div class="caller-avatar-large" id="incomingAvatar">?</div>
            <h2 id="incomingCallText" style="font-size: 20px; font-weight: 600; margin-bottom: 5px;">Username</h2>
            <p id="incomingCallType" style="color: #9CA3AF; font-size: 14px;">Incoming Video Call...</p>
            <div class="call-action-btns">
                <button class="circle-action-btn decline" id="declineCallBtn">❌</button>
                <button class="circle-action-btn accept" id="acceptCallBtn">📞</button>
            </div>
        </div>

        <!-- 📱 VIEW 1: HOME (CONTACTS LIST) -->
        <div id="homeView" class="home-view">
            <div class="main-header">
                <div class="main-header-left">
                    <div class="main-avatar" id="myAvatar">U</div>
                    <div class="main-info">
                        <h2 id="myName">My Profile</h2>
                        <p>Logged In</p>
                    </div>
                </div>
                <button id="logoutBtn" class="icon-btn" style="color: #EF4444;" title="Log Out">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                </button>
            </div>
            <div class="contact-list" id="contactListView"></div>
        </div>

        <!-- 💬 VIEW 2: PRIVATE CHAT (FULL SCREEN) -->
        <div id="chatView" class="chat-view">
            
            <!-- 📞 FLOATING/FULLSCREEN CALL OVERLAY WITH DRAG FEATURE -->
            <div id="callOverlay" class="call-overlay">
                <div class="video-container">
                    <div id="callStatus">Dialing...</div>
                    <video id="remoteVideo" autoplay playsinline></video>
                    <video id="localVideo" autoplay playsinline muted></video>
                    
                    <div class="call-controls">
                        <button id="muteMicBtn" class="action-call-btn toggle-screen-btn" title="Mute Microphone">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                        </button>
                        <button id="toggleCamBtn" class="action-call-btn toggle-screen-btn" title="Turn Off Camera">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
                        </button>
                        <button id="fullScreenBtn" class="action-call-btn toggle-screen-btn" title="Toggle Full Screen">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
                        </button>
                        <button id="endCallBtn" class="action-call-btn end-call-btn" title="End Call">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-3.33-2.67m-2.67-3.34a19.79 19.79 0 0 1-3.07-8.63A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91"></path><line x1="23" y1="1" x2="1" y2="23"></line></svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Chat Header -->
            <div class="chat-header">
                <div class="chat-header-left">
                    <button id="backToContactsBtn" class="back-btn" title="Back">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                    </button>
                    <div class="chat-header-avatar" id="activeChatAvatar">?</div>
                    <div class="chat-header-info">
                        <h2 id="activeChatName">User</h2>
                        <p id="activeChatStatus" style="color: #8E8E8E;">Offline</p>
                    </div>
                </div>
                <div class="chat-header-icons">
                    <button class="icon-btn" id="videoCallBtn" title="Video Call">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
                    </button>
                    <button class="icon-btn" id="voiceCallBtn" title="Voice Call">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                    </button>
                </div>
            </div>

            <div id="uploadStatus" class="uploading">Uploading media... Please wait.</div>
            <div class="chat-body" id="chatBody"></div>
            <div id="typingIndicator" class="typing-indicator">Someone typing...</div>

            <input type="file" id="fileInput" style="display: none;" accept="image/*,video/*,.pdf,.doc,.docx">

            <div class="footer">
                <button class="icon-btn-footer" id="attachBtn">📎</button>
                <input type="text" id="messageInput" class="input-box" placeholder="Message..." autocomplete="off">
                <button id="sendBtn" class="send-btn">Send</button>
            </div>
        </div>

        <div id="deleteModal" class="modal-overlay">
            <div class="modal-content">
                <h3 style="font-size: 16px; margin-bottom: 5px; color: #111827;">Delete Message?</h3>
                <p style="font-size: 13px; color: #6B7280;">This will delete it permanently for both.</p>
                <div class="modal-actions">
                    <button id="cancelDeleteBtn" class="btn-cancel">Cancel</button>
                    <button id="confirmDeleteBtn" class="btn-danger">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <!-- FIREBASE AND WebRTC SCRIPT -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit, serverTimestamp, doc, setDoc, getDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB6OBfN-UovERSSQUuVKLQaEvDeko96CpA",
            authDomain: "chating-576a3.firebaseapp.com",
            projectId: "chating-576a3",
            storageBucket: "chating-576a3.firebasestorage.app",
            messagingSenderId: "419008189208",
            appId: "1:419008189208:web:f340c72c97c7978c3e846d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app); 

        let currentUser = null; 
        let isLoginMode = true; 
        let typingTimeout = null;
        let activeChatUser = null; 
        let msgUnsubscribe = null;
        let localUsersCache = [];
        let unreadListeners = {};
        let unreadStatus = {}; 

        const authScreen = document.getElementById('authScreen');
        const homeView = document.getElementById('homeView');
        const chatView = document.getElementById('chatView');
        const usernameInput = document.getElementById('usernameInput');
        const passwordInput = document.getElementById('passwordInput');
        const mainAuthBtn = document.getElementById('mainAuthBtn');
        const authError = document.getElementById('authError');
        const chatBody = document.getElementById('chatBody');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const fileInput = document.getElementById('fileInput');
        const typingIndicator = document.getElementById('typingIndicator');
        const contactListView = document.getElementById('contactListView');
        const deleteModal = document.getElementById('deleteModal');
        const callOverlay = document.getElementById('callOverlay');
        const incomingCallBox = document.getElementById('incomingCallBox');

        function getChatRoomId(u1, u2) { return [u1, u2].sort().join('_'); }

        // 🔥 XSS SECURITY FILTER
        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }

        // --- AUTH ---
        document.getElementById('switchBtn').addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            authError.style.display = 'none';
            mainAuthBtn.innerText = isLoginMode ? "Log In" : "Sign Up";
            document.getElementById('switchText').innerText = isLoginMode ? "Don't have an account?" : "Have an account?";
            document.getElementById('switchBtn').innerText = isLoginMode ? "Sign up" : "Log in";
            checkInputs();
        });

        function checkInputs() {
            if(usernameInput.value.trim().length > 0 && passwordInput.value.trim().length > 5) mainAuthBtn.classList.add('active-btn');
            else mainAuthBtn.classList.remove('active-btn');
        }
        usernameInput.addEventListener('input', checkInputs);
        passwordInput.addEventListener('input', checkInputs);

        messageInput.addEventListener('focus', () => {
            setTimeout(() => { chatBody.scrollTop = chatBody.scrollHeight; }, 100);
        });

        messageInput.addEventListener('input', () => {
            sendBtn.classList.toggle('active', messageInput.value.trim().length > 0 && activeChatUser !== null);
            if (currentUser && activeChatUser) {
                setDoc(doc(db, "typing_status", currentUser), { isTyping: true, typingWith: activeChatUser }).catch(console.error);
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => {
                    setDoc(doc(db, "typing_status", currentUser), { isTyping: false, typingWith: activeChatUser }).catch(console.error);
                }, 1500);
            }
        });

        function showError(msg) { authError.innerText = msg; authError.style.display = 'block'; }

        mainAuthBtn.addEventListener('click', async () => {
            const rawUsername = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            if (!rawUsername || !password) return showError("Please fill all fields.");
            mainAuthBtn.innerText = "Please wait...";
            const dummyEmail = rawUsername.toLowerCase().replace(/\s+/g, '') + "@chat.com";

            try {
                if(isLoginMode) await signInWithEmailAndPassword(auth, dummyEmail, password);
                else await createUserWithEmailAndPassword(auth, dummyEmail, password);
            } catch (error) {
                mainAuthBtn.innerText = isLoginMode ? "Log In" : "Sign Up";
                let errorMsg = error.message.replace("Firebase: ", "");
                if (error.code === "auth/invalid-credential") errorMsg = "Incorrect username or password.";
                if (error.code === "auth/email-already-in-use") errorMsg = "Username already taken.";
                showError(errorMsg);
            }
        });

        function updatePresence(isOnline) {
            if(currentUser) {
                const data = { name: currentUser, isOnline: isOnline };
                if(!isOnline) data.lastSeen = new Date().getTime(); 
                setDoc(doc(db, "active_users", currentUser), data, { merge: true }).catch(console.error);
            }
        }
        window.addEventListener("beforeunload", () => updatePresence(false));
        window.addEventListener("pagehide", () => updatePresence(false));
        document.addEventListener("visibilitychange", () => updatePresence(document.visibilityState === 'visible'));
        document.getElementById('logoutBtn').addEventListener('click', () => { updatePresence(false); signOut(auth); });

        // --- 📞 DRAGGABLE WebRTC CALLS ---
        const servers = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };
        let pc = null; let localStream = null; let remoteStream = null;
        let activeCallDocRef = null; let callUnsubscribers = []; let callTypeGlobal = 'video';

        // 🟢 DRAG LOGIC ADDED HERE
        let isDragging = false;
        let currentX; let currentY; let initialX; let initialY;
        let xOffset = 0; let yOffset = 0;

        function dragStart(e) {
            if (callOverlay.classList.contains('fullscreen')) return; // Disable drag in full screen
            
            // Do not drag if clicking on buttons or local video (used for swap logic)
            if (e.target.closest('.call-controls') || e.target.id === 'localVideo') return;
            
            if (e.type === "touchstart") {
                initialX = e.touches[0].clientX - xOffset;
                initialY = e.touches[0].clientY - yOffset;
            } else {
                initialX = e.clientX - xOffset;
                initialY = e.clientY - yOffset;
            }
            isDragging = true;
        }

        function dragEnd(e) {
            initialX = currentX;
            initialY = currentY;
            isDragging = false;
        }

        function drag(e) {
            if (isDragging && !callOverlay.classList.contains('fullscreen')) {
                e.preventDefault(); // Stop screen from scrolling while dragging
                if (e.type === "touchmove") {
                    currentX = e.touches[0].clientX - initialX;
                    currentY = e.touches[0].clientY - initialY;
                } else {
                    currentX = e.clientX - initialX;
                    currentY = e.clientY - initialY;
                }
                xOffset = currentX;
                yOffset = currentY;
                callOverlay.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
            }
        }

        // Attach drag event listeners
        callOverlay.addEventListener("touchstart", dragStart, { passive: false });
        callOverlay.addEventListener("touchend", dragEnd, false);
        callOverlay.addEventListener("touchmove", drag, { passive: false });
        callOverlay.addEventListener("mousedown", dragStart, false);
        callOverlay.addEventListener("mouseup", dragEnd, false);
        callOverlay.addEventListener("mousemove", drag, false);
        callOverlay.addEventListener("mouseleave", dragEnd, false);

        // 🔄 VIDEO SWAP LOGIC (Click small video to swap)
        document.getElementById('localVideo').addEventListener('click', () => {
            const vc = document.querySelector('.video-container');
            if (!vc.classList.contains('swapped')) vc.classList.add('swapped');
        });
        document.getElementById('remoteVideo').addEventListener('click', () => {
            const vc = document.querySelector('.video-container');
            if (vc.classList.contains('swapped')) vc.classList.remove('swapped');
        });

        document.getElementById('muteMicBtn').addEventListener('click', () => {
            if(localStream) {
                const audioTrack = localStream.getAudioTracks()[0];
                if(audioTrack) {
                    audioTrack.enabled = !audioTrack.enabled;
                    document.getElementById('muteMicBtn').style.background = audioTrack.enabled ? 'rgba(255,255,255,0.2)' : '#EF4444';
                }
            }
        });

        document.getElementById('toggleCamBtn').addEventListener('click', () => {
            if(localStream) {
                const videoTrack = localStream.getVideoTracks()[0];
                if(videoTrack) {
                    videoTrack.enabled = !videoTrack.enabled;
                    document.getElementById('toggleCamBtn').style.background = videoTrack.enabled ? 'rgba(255,255,255,0.2)' : '#EF4444';
                }
            }
        });

        document.getElementById('fullScreenBtn').addEventListener('click', () => {
            callOverlay.classList.toggle('fullscreen');
            if (callOverlay.classList.contains('fullscreen')) {
                callOverlay.style.transform = 'none'; // Lock position in fullscreen
            } else {
                callOverlay.style.transform = `translate3d(${xOffset}px, ${yOffset}px, 0)`; // Restore dragged position
            }
        });

        function setupCallControlsUI(isVideo) {
            document.getElementById('toggleCamBtn').style.display = isVideo ? 'flex' : 'none';
            document.getElementById('muteMicBtn').style.background = 'rgba(255,255,255,0.2)';
            document.getElementById('toggleCamBtn').style.background = 'rgba(255,255,255,0.2)';
            document.querySelector('.video-container').classList.remove('swapped'); 
        }

        function listenForIncomingCalls() {
            onSnapshot(doc(db, 'calls', currentUser), async (snapshot) => {
                const data = snapshot.data();
                if (data && data.status === 'calling') {
                    if (callOverlay.style.display !== 'flex') {
                        document.getElementById('incomingAvatar').innerText = escapeHTML(data.caller).charAt(0);
                        document.getElementById('incomingCallText').innerText = escapeHTML(data.caller);
                        document.getElementById('incomingCallType').innerText = data.type === 'video' ? 'Incoming Video Call...' : 'Incoming Voice Call...';
                        callTypeGlobal = data.type;
                        activeCallDocRef = doc(db, 'calls', currentUser); 
                        incomingCallBox.style.display = 'flex';
                    }
                } else if (!data || data.status === 'ended') {
                    incomingCallBox.style.display = 'none';
                    if (callOverlay.style.display === 'flex') cleanUpCallUI();
                }
            });
        }

        async function makeCall(isVideo) {
            if (!activeChatUser) return;
            activeCallDocRef = doc(db, 'calls', activeChatUser); 
            const currentCallSnap = await getDoc(activeCallDocRef);
            if (currentCallSnap.exists() && currentCallSnap.data().status === 'calling') {
                alert("User is busy."); return;
            }

            setupCallControlsUI(isVideo);
            
            // Reset drag positions on new call
            xOffset = 0; yOffset = 0;
            callOverlay.style.transform = 'none';
            
            callOverlay.classList.remove('fullscreen');
            callOverlay.style.display = 'flex';
            document.getElementById('callStatus').innerText = 'Starting...';

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: isVideo, audio: true });
                document.getElementById('localVideo').srcObject = localStream;
                document.getElementById('localVideo').style.display = isVideo ? 'block' : 'none';
            } catch (e) { alert("Permission Denied!"); endCall(); return; }

            pc = new RTCPeerConnection(servers);
            remoteStream = new MediaStream();
            document.getElementById('remoteVideo').srcObject = remoteStream;
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

            pc.ontrack = event => {
                event.streams[0].getTracks().forEach(track => remoteStream.addTrack(track));
                document.getElementById('callStatus').innerText = 'Live 🟢';
            };

            document.getElementById('callStatus').innerText = `Ringing...`;
            await setDoc(activeCallDocRef, { status: 'calling', caller: currentUser, type: isVideo ? 'video' : 'voice', offer: null, answer: null });

            pc.onicecandidate = event => {
                if(event.candidate) addDoc(collection(activeCallDocRef, 'callerCandidates'), event.candidate.toJSON());
            };

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            await updateDoc(activeCallDocRef, { offer: { type: offer.type, sdp: offer.sdp } });

            const unsubAnswer = onSnapshot(activeCallDocRef, snapshot => {
                const data = snapshot.data();
                if (data?.answer && !pc.currentRemoteDescription) {
                    pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                    document.getElementById('callStatus').innerText = 'Live 🟢';
                }
                if (data?.status === 'ended') cleanUpCallUI();
            });
            callUnsubscribers.push(unsubAnswer);

            const unsubCandidates = onSnapshot(collection(activeCallDocRef, 'calleeCandidates'), snapshot => {
                snapshot.docChanges().forEach(change => {
                    if (change.type === 'added') pc.addIceCandidate(new RTCIceCandidate(change.doc.data()));
                });
            });
            callUnsubscribers.push(unsubCandidates);
        }

        document.getElementById('acceptCallBtn').addEventListener('click', async () => {
            incomingCallBox.style.display = 'none'; 
            
            // Reset drag positions on new call pickup
            xOffset = 0; yOffset = 0;
            callOverlay.style.transform = 'none';
            
            callOverlay.classList.remove('fullscreen'); 
            callOverlay.style.display = 'flex';
            document.getElementById('callStatus').innerText = 'Connecting...';

            const isVideo = callTypeGlobal === 'video';
            setupCallControlsUI(isVideo);

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: isVideo, audio: true });
                document.getElementById('localVideo').srcObject = localStream;
                document.getElementById('localVideo').style.display = isVideo ? 'block' : 'none';
            } catch (e) { alert("Error."); endCall(); return; }

            pc = new RTCPeerConnection(servers);
            remoteStream = new MediaStream();
            document.getElementById('remoteVideo').srcObject = remoteStream;
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

            pc.ontrack = event => {
                event.streams[0].getTracks().forEach(track => remoteStream.addTrack(track));
                document.getElementById('callStatus').innerText = 'Live 🟢';
            };

            pc.onicecandidate = event => {
                if(event.candidate) addDoc(collection(activeCallDocRef, 'calleeCandidates'), event.candidate.toJSON());
            };

            const roomSnapshot = await getDoc(activeCallDocRef);
            const roomData = roomSnapshot.data();

            await pc.setRemoteDescription(new RTCSessionDescription(roomData.offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            
            await updateDoc(activeCallDocRef, { answer: { type: answer.type, sdp: answer.sdp }, status: 'connected' });

            const unsubCandidates = onSnapshot(collection(activeCallDocRef, 'callerCandidates'), snapshot => {
                snapshot.docChanges().forEach(change => {
                    if (change.type === 'added') pc.addIceCandidate(new RTCIceCandidate(change.doc.data()));
                });
            });
            callUnsubscribers.push(unsubCandidates);
        });

        document.getElementById('declineCallBtn').addEventListener('click', async () => {
            incomingCallBox.style.display = 'none';
            if (activeCallDocRef) await setDoc(activeCallDocRef, { status: 'ended' }, { merge: true });
        });

        async function endCall() {
            if (activeCallDocRef) await setDoc(activeCallDocRef, { status: 'ended' }, { merge: true }).catch(console.error);
            cleanUpCallUI();
        }

        function cleanUpCallUI() {
            if (pc) { pc.close(); pc = null; }
            if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
            document.getElementById('localVideo').srcObject = null;
            document.getElementById('remoteVideo').srcObject = null;
            callOverlay.style.display = 'none';
            callOverlay.classList.remove('fullscreen');
            document.querySelector('.video-container').classList.remove('swapped');
            
            // Reset position variables
            xOffset = 0; yOffset = 0;
            callOverlay.style.transform = 'none';

            incomingCallBox.style.display = 'none';
            callUnsubscribers.forEach(unsub => unsub());
            callUnsubscribers = [];
        }

        document.getElementById('videoCallBtn').addEventListener('click', () => makeCall(true));
        document.getElementById('voiceCallBtn').addEventListener('click', () => makeCall(false)); 
        document.getElementById('endCallBtn').addEventListener('click', endCall);

        // --- 🟢 UNREAD BADGE SYSTEM ---
        function setupUnreadListeners() {
            localUsersCache.forEach(user => {
                if (user.name === currentUser) return;
                
                if (!unreadListeners[user.name]) {
                    const roomId = getChatRoomId(currentUser, user.name);
                    const q = query(collection(db, "chats", roomId, "messages"), orderBy("timestamp", "desc"), limit(1));
                    
                    unreadListeners[user.name] = onSnapshot(q, (snap) => {
                        if (!snap.empty) {
                            const msg = snap.docs[0].data();
                            const lastRead = parseInt(localStorage.getItem(`read_${currentUser}_${user.name}`) || '0');
                            const msgTime = msg.timestamp ? msg.timestamp.toMillis() : Date.now();
                            
                            if (msg.sender === user.name && msgTime > lastRead && activeChatUser !== user.name) {
                                unreadStatus[user.name] = true;
                            } else {
                                unreadStatus[user.name] = false;
                            }
                            renderContactList(); 
                        }
                    });
                }
            });
        }

        // --- UI NAVIGATION ---
        window.selectUserChat = function(targetUser) {
            activeChatUser = targetUser;
            localStorage.setItem(`read_${currentUser}_${targetUser}`, Date.now().toString());
            unreadStatus[targetUser] = false;

            homeView.style.display = 'none';
            chatView.style.display = 'flex';
            
            document.getElementById('activeChatName').innerText = escapeHTML(targetUser);
            document.getElementById('activeChatAvatar').innerText = escapeHTML(targetUser).charAt(0);
            
            updateActiveChatStatus();
            listenToPrivateMessages();
        };

        document.getElementById('backToContactsBtn').addEventListener('click', () => {
            activeChatUser = null;
            chatView.style.display = 'none';
            homeView.style.display = 'flex';
            if (msgUnsubscribe) msgUnsubscribe();
            renderContactList(); 
        });

        function listenToPrivateMessages() {
            if (msgUnsubscribe) msgUnsubscribe(); 
            const roomId = getChatRoomId(currentUser, activeChatUser);
            const msgQuery = query(collection(db, "chats", roomId, "messages"), orderBy("timestamp", "asc"));
            
            msgUnsubscribe = onSnapshot(msgQuery, (snapshot) => {
                chatBody.innerHTML = '';
                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    const isMe = data.sender === currentUser;
                    let mediaHTML = '';
                    
                    const safeText = escapeHTML(data.text);
                    const safeMediaUrl = escapeHTML(data.mediaUrl);

                    if (data.mediaUrl) {
                        if (data.mediaType === 'image') mediaHTML = `<img src="${safeMediaUrl}" alt="image">`;
                        else if (data.mediaType === 'video') mediaHTML = `<video src="${safeMediaUrl}" controls></video>`;
                        else mediaHTML = `<a href="${safeMediaUrl}" target="_blank" class="file-link">📎 Download File</a>`;
                    }
                    const delBtn = isMe ? `<button class="delete-btn" data-id="${docSnap.id}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>` : '';
                    
                    chatBody.innerHTML += `
                        <div class="msg ${isMe ? 'sent' : 'received'}">
                            ${safeText ? `<div>${safeText}</div>` : ''}
                            ${mediaHTML}
                            <div class="msg-footer">
                                <span class="time">${data.timestamp ? formatTime(data.timestamp.toDate()) : '...'}</span>
                                ${delBtn}
                            </div>
                        </div>
                    `;
                });
                chatBody.scrollTop = chatBody.scrollHeight;
                
                if(activeChatUser) localStorage.setItem(`read_${currentUser}_${activeChatUser}`, Date.now().toString());
            });
        }

        // Render List & Badges
        function renderContactList() {
            contactListView.innerHTML = '';
            let count = 0;
            localUsersCache.forEach(data => {
                if (data.name === currentUser) return;
                count++;
                
                let borderClass = data.isOnline ? 'online' : 'offline';
                let statusText = data.isOnline ? 'Active now' : parseLastSeen(data.lastSeen);
                let badgeHTML = unreadStatus[data.name] ? `<div class="new-msg-badge">New</div>` : '';
                let safeName = escapeHTML(data.name);

                contactListView.innerHTML += `
                    <div class="contact-item" onclick="selectUserChat('${safeName}')">
                        <div class="contact-avatar ${borderClass}">${safeName.charAt(0)}</div>
                        <div class="contact-info-col">
                            <div class="contact-name">${safeName}</div>
                            <div class="contact-status ${borderClass}">${statusText}</div>
                        </div>
                        ${badgeHTML}
                    </div>
                `;
            });
            if(count === 0) {
                contactListView.innerHTML = '<div style="color:#8e8e8e; padding:30px; text-align:center; font-size: 14px;">No contacts found.<br>Invite friends to sign up!</div>';
            }
        }

        function updateActiveChatStatus() {
            if(!activeChatUser) return;
            const activeUserData = localUsersCache.find(u => u.name === activeChatUser);
            if(activeUserData) {
                const isOnline = activeUserData.isOnline;
                document.getElementById('activeChatStatus').innerText = isOnline ? 'Active now' : parseLastSeen(activeUserData.lastSeen);
                document.getElementById('activeChatStatus').style.color = isOnline ? '#10B981' : '#6B7280';
            }
        }

        // --- LIFECYCLE ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user.email.split('@')[0];
                document.getElementById('myName').innerText = escapeHTML(currentUser);
                document.getElementById('myAvatar').innerText = escapeHTML(currentUser).charAt(0);
                
                activeChatUser = null;
                authScreen.style.display = 'none'; 
                chatView.style.display = 'none';
                homeView.style.display = 'flex';
                
                startAppListeners();
                listenForIncomingCalls(); 
            } else {
                currentUser = null;
                authScreen.style.display = 'flex'; 
                homeView.style.display = 'none';
                chatView.style.display = 'none';  
            }
        });

        function parseLastSeen(timestamp) {
            if (!timestamp) return 'Offline';
            const date = new Date(timestamp);
            const now = new Date();
            let h = date.getHours(), m = date.getMinutes(), ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12; m = m < 10 ? '0' + m : m;
            const timeStr = `${h}:${m} ${ampm}`;
            if (date.toDateString() === now.toDateString()) return `Today, ${timeStr}`;
            return `${date.getDate()} ${date.toLocaleString('default', { month: 'short' })}, ${timeStr}`;
        }

        function formatTime(date) {
            if (!date) return '';
            let h = date.getHours(), m = date.getMinutes(), ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12; m = m < 10 ? '0' + m : m;
            return `${h}:${m} ${ampm}`;
        }

        function startAppListeners() {
            updatePresence(true);
            
            onSnapshot(collection(db, "active_users"), (snapshot) => {
                localUsersCache = [];
                snapshot.forEach(d => localUsersCache.push(d.data()));
                
                setupUnreadListeners(); 
                
                if (!activeChatUser) renderContactList();
                else { updateActiveChatStatus(); renderContactList(); }
            });

            onSnapshot(collection(db, "typing_status"), (snapshot) => {
                let typingNames = [];
                snapshot.forEach(d => {
                    const data = d.data();
                    if (data.isTyping && d.id !== currentUser && data.typingWith === currentUser) {
                        typingNames.push(escapeHTML(d.id));
                    }
                });
                typingIndicator.style.display = typingNames.length > 0 ? 'block' : 'none';
                if(typingNames.length > 0) typingIndicator.innerText = `${typingNames.join(', ')} is typing...`;
            });
        }

        async function sendMessage(text, url = null, type = null) {
            if (!activeChatUser) return;
            if (!text && !url) return;
            messageInput.value = ''; sendBtn.classList.remove('active');
            if(currentUser) setDoc(doc(db, "typing_status", currentUser), { isTyping: false, typingWith: activeChatUser }).catch(console.error);
            
            const roomId = getChatRoomId(currentUser, activeChatUser);
            await addDoc(collection(db, "chats", roomId, "messages"), { 
                sender: currentUser, text: text, mediaUrl: url, mediaType: type, timestamp: serverTimestamp() 
            });
        }
        
        sendBtn.addEventListener('click', () => sendMessage(messageInput.value.trim()));
        messageInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(messageInput.value.trim()); });

        // --- ☁️ CLOUDINARY UPLOAD ---
        const cloudName = 'dqzx541to';         
        const uploadPreset = 'chat_upload';    
        
        document.getElementById('attachBtn').addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', async (e) => {
            if (!activeChatUser) return;
            const file = e.target.files[0];
            if (!file) return;
            let type = file.type.startsWith('image/') ? 'image' : (file.type.startsWith('video/') ? 'video' : 'raw');
            
            const statusDiv = document.getElementById('uploadStatus');
            statusDiv.style.display = 'block';

            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', uploadPreset);

            try {
                const response = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/${type}/upload`, { method: 'POST', body: formData });
                const data = await response.json();
                if (data.secure_url) { sendMessage('', data.secure_url, type); fileInput.value = ''; }
            } catch (error) { alert("Upload failed! Check unsigned configurations."); }
            statusDiv.style.display = 'none';
        });

        // --- DELETE MESSAGE ---
        let msgIdToDelete = null;
        chatBody.addEventListener('click', (e) => {
            const btn = e.target.closest('.delete-btn');
            if (btn) { msgIdToDelete = btn.getAttribute('data-id'); deleteModal.style.display = 'flex'; }
        });
        document.getElementById('cancelDeleteBtn').addEventListener('click', () => deleteModal.style.display = 'none');
        document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
            if (msgIdToDelete && activeChatUser) {
                const roomId = getChatRoomId(currentUser, activeChatUser);
                await deleteDoc(doc(db, "chats", roomId, "messages", msgIdToDelete));
                deleteModal.style.display = 'none'; msgIdToDelete = null;
            }
        });
    </script>
</body>
</html>
